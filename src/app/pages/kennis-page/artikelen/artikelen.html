<section class="subhero subhero--met-veldstrip">
  <div class="subhero__media">
    <img src="images/mistymountains.jpeg" alt="Mistige bergen" />
  </div>
  <div class="subhero__content">
    <span class="subhero__eyebrow">Kennis</span>
    <h1>Reisverhalen</h1>
    <p>Lees verhalen uit het veld met praktische lessen voor je eigen tochten.</p>
  </div>
  <app-veldstrip [items]="veldgegevens" meta="notities" />
  <app-route-divider class="subhero__route" variant="overlay" [stops]="etappes" [actief]="actief" />
</section>
