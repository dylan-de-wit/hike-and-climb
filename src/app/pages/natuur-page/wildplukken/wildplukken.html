<section class="subhero subhero--met-veldstrip">
  <div class="subhero__media">
    <img src="images/treeroot.jpeg" alt="Bosbodem met wortels en natuurlijke details" />
  </div>
  <div class="subhero__content">
    <span class="subhero__eyebrow">Natuur</span>
    <h1>Wildplukken</h1>
    <p>Herken eetbare planten zorgvuldig en pluk met respect voor plek en seizoen.</p>
  </div>
  <app-veldstrip [items]="veldgegevens" meta="veldcheck" />
  <app-route-divider class="subhero__route" variant="overlay" [stops]="etappes" [actief]="actief" />
</section>
